<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DebateForge · Gemini 3.1 Flash-Lite</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pro: #C0392B; --pro-l: #fdf0ef; --pro-m: #e8b4b0; --pro-t: #7b1a13;
    --con: #1A5276; --con-l: #edf3fb; --con-m: #a9c4df; --con-t: #0d2f45;
    --ink: #12121e; --paper: #f9f7f2; --border: #e0dbd0;
  }

  body { font-family: 'Noto Sans KR', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  /* HEADER */
  header { background: var(--ink); padding: 44px 24px 36px; text-align: center; }
  .logo-icon { font-size: 30px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 12px rgba(66,133,244,.5)); }
  .logo-text { font-family: Georgia, serif; font-size: 30px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, #4285F4, #34A853, #FBBC05, #EA4335);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { color: rgba(255,255,255,.4); font-size: 13px; margin-top: 8px; letter-spacing: .5px; }

  /* INPUT SECTION */
  .input-section { padding: 32px 24px 0; }
  .input-card { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 12px;
    padding: 28px 30px; box-shadow: 0 4px 32px rgba(0,0,0,.08); border: 1px solid var(--border); }
  label.field-label { display: block; font-size: 11px; letter-spacing: 2px; font-weight: 700;
    color: #999; margin-bottom: 10px; text-transform: uppercase; }
  .input-row { display: flex; gap: 8px; margin-bottom: 20px; }
  input[type=text], input[type=password] {
    flex: 1; padding: 13px 16px; font-size: 14px; font-family: inherit;
    border: 2px solid var(--border); border-radius: 8px; background: #fdfcf9;
    color: var(--ink); outline: none; transition: border .2s, box-shadow .2s; }
  input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(18,18,30,.08); }
  .btn-eye { padding: 13px 14px; border: 2px solid var(--border); border-radius: 8px;
    background: #f5f3ee; cursor: pointer; font-size: 14px; transition: opacity .2s; }
  .btn-generate { padding: 13px 22px; background: var(--ink); color: #fff; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit;
    cursor: pointer; white-space: nowrap; transition: opacity .2s; }
  .btn-generate:disabled { background: #aaa; cursor: not-allowed; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chips-label { font-size: 11px; color: #ccc; letter-spacing: 1px; }
  .chip { padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd; background: #f5f3ee;
    font-size: 12px; color: #555; cursor: pointer; font-family: inherit; transition: opacity .2s; }
  .chip:hover { opacity: .75; }

  /* ERROR */
  .error { max-width: 760px; margin: 16px auto; padding: 14px 20px;
    background: #fff0ef; border: 1px solid #f5b4b0; border-radius: 8px;
    color: var(--pro); font-size: 13px; text-align: center; display: none; }

  /* LOADING */
  .loading { text-align: center; padding: 60px 24px; display: none; }
  .spinner { width: 40px; height: 40px; margin: 0 auto 20px;
    border: 3px solid var(--border); border-top: 3px solid #4285F4;
    border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 6px; }
  .loading small { font-size: 13px; color: #999; }

  /* RESULT */
  #result { max-width: 1240px; margin: 32px auto; padding: 0 24px 60px; display: none; }
  .topic-banner { text-align: center; margin-bottom: 28px; padding: 22px;
    background: var(--ink); border-radius: 10px; }
  .topic-banner small { font-size: 11px; letter-spacing: 3px; color: #FBBC05;
    font-weight: 700; display: block; margin-bottom: 8px; }
  .topic-banner h2 { font-size: clamp(15px, 2.5vw, 23px); color: #fff;
    font-family: Georgia, serif; font-weight: 700; }

  /* TABS */
  .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .tab { padding: 9px 24px; border-radius: 6px; border: 1.5px solid #ddd;
    background: #fff; color: #666; font-size: 13px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all .2s; }
  .tab.active-both { background: var(--ink); color: #fff; border-color: var(--ink); }
  .tab.active-pro  { background: var(--pro); color: #fff; border-color: var(--pro); }
  .tab.active-con  { background: var(--con); color: #fff; border-color: var(--con); }

  /* COLUMNS */
  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .columns.single { grid-template-columns: 1fr; }

  /* CARD */
  .card { background: #fff; border-radius: 12px; padding: 28px 26px 24px;
    box-shadow: 0 2px 20px rgba(0,0,0,.06); border: 1px solid; border-top-width: 4px; }
  .card.pro { border-color: var(--pro-m); border-top-color: var(--pro); }
  .card.con { border-color: var(--con-m); border-top-color: var(--con); }
  .badge { display: inline-block; font-size: 11px; letter-spacing: 3px; font-weight: 700;
    padding: 5px 14px; border-radius: 3px; margin-bottom: 14px; color: #fff; }
  .card.pro .badge { background: var(--pro); }
  .card.con .badge { background: var(--con); }
  .stance { font-size: 13.5px; line-height: 1.85; color: #444; margin-bottom: 16px; }
  .divider { height: 1px; margin-bottom: 22px; }
  .card.pro .divider { background: linear-gradient(to right, var(--pro-m), transparent); }
  .card.con .divider { background: linear-gradient(to right, var(--con-m), transparent); }

  /* ARGUMENT */
  .arg { margin-bottom: 24px; }
  .arg-num { font-size: 10px; letter-spacing: 2px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
  .card.pro .arg-num { color: var(--pro); }
  .card.con .arg-num { color: var(--con); }
  .arg-title { font-size: 15px; font-weight: 700; padding-left: 10px;
    margin-bottom: 8px; line-height: 1.4; font-family: Georgia, serif;
    border-left: 3px solid; }
  .card.pro .arg-title { color: var(--pro-t); border-color: var(--pro); }
  .card.con .arg-title { color: var(--con-t); border-color: var(--con); }
  .arg-body { font-size: 13px; line-height: 1.9; color: #444; }
  .evidence { margin-top: 10px; padding: 10px 14px; border-radius: 0 6px 6px 0;
    font-size: 12.5px; color: #555; line-height: 1.7; display: flex; gap: 8px;
    border-left: 3px solid; }
  .card.pro .evidence { background: var(--pro-l); border-color: var(--pro-m); }
  .card.con .evidence { background: var(--con-l); border-color: var(--con-m); }

  /* CONCLUSION */
  .conclusion { margin-top: 8px; padding: 16px 18px; border-radius: 8px; border: 1px solid; }
  .card.pro .conclusion { background: var(--pro-l); border-color: var(--pro-m); }
  .card.con .conclusion { background: var(--con-l); border-color: var(--con-m); }
  .conclusion-label { font-size: 10px; letter-spacing: 2px; font-weight: 700; margin-bottom: 8px; }
  .card.pro .conclusion-label { color: var(--pro); }
  .card.con .conclusion-label { color: var(--con); }
  .conclusion p { font-size: 13.5px; line-height: 1.8; font-family: Georgia, serif; font-weight: 600; color: #222; }

  footer { text-align: center; padding: 24px; border-top: 1px solid var(--border);
    font-size: 11px; color: #ccc; letter-spacing: .5px; }

  @media (max-width: 680px) {
    .columns { grid-template-columns: 1fr !important; }
    .input-card { padding: 20px 18px; }
  }
</style>
</head>
<body>

<header>
  <span class="logo-icon">⚖</span>
  <div class="logo-text">DebateForge</div>
  <p class="logo-sub">Powered by Gemini 3.1 Flash-Lite · 찬반 입론서 자동 생성</p>
</header>

<section class="input-section">
  <div class="input-card">
    <label class="field-label">Gemini API Key</label>
    <div class="input-row">
      <input type="password" id="apiKey" placeholder="AIzaSy... (Google AI Studio에서 발급)" />
      <button class="btn-eye" onclick="toggleKey()">👁</button>
    </div>

    <label class="field-label">토론 주제</label>
    <div class="input-row">
      <input type="text" id="topicInput" placeholder="예: 사형제도를 폐지해야 한다" onkeydown="if(event.key==='Enter') generate()" />
      <button class="btn-generate" id="genBtn" onclick="generate()">생성하기</button>
    </div>

    <div class="chips">
      <span class="chips-label">예시</span>
      <button class="chip" onclick="setTopic(this)">사형제도를 폐지해야 한다</button>
      <button class="chip" onclick="setTopic(this)">AI가 인간의 일자리를 빼앗는다</button>
      <button class="chip" onclick="setTopic(this)">동물실험을 금지해야 한다</button>
      <button class="chip" onclick="setTopic(this)">대학입시 수능을 폐지해야 한다</button>
    </div>
  </div>
</section>

<div class="error" id="error"></div>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Gemini 3.1 Flash-Lite가 분석 중…</p>
  <small>찬반 논거를 균형 있게 구성하고 있습니다</small>
</div>

<div id="result">
  <div class="topic-banner">
    <small>토론 주제</small>
    <h2 id="topicDisplay"></h2>
  </div>
  <div class="tabs">
    <button class="tab active-both" onclick="switchTab('both')">찬반 전체</button>
    <button class="tab" onclick="switchTab('pro')">찬성</button>
    <button class="tab" onclick="switchTab('con')">반대</button>
  </div>
  <div class="columns" id="columns">
    <div class="card pro" id="proCard"></div>
    <div class="card con" id="conCard"></div>
  </div>
</div>

<footer>AI가 생성한 입론서는 교육·토론 연습 목적으로 활용하세요 · DebateForge powered by Google Gemini 3.1 Flash-Lite</footer>

<script>
  let showKey = false;
  let currentTab = 'both';

  function toggleKey() {
    showKey = !showKey;
    document.getElementById('apiKey').type = showKey ? 'text' : 'password';
  }

  function setTopic(el) {
    document.getElementById('topicInput').value = el.textContent;
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function switchTab(tab) {
    currentTab = tab;
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach((t, i) => {
      t.className = 'tab';
      if ((i === 0 && tab === 'both') || (i === 1 && tab === 'pro') || (i === 2 && tab === 'con')) {
        t.className = `tab active-${tab}`;
      }
    });
    const cols = document.getElementById('columns');
    const pro = document.getElementById('proCard');
    const con = document.getElementById('conCard');
    cols.className = tab === 'both' ? 'columns' : 'columns single';
    pro.style.display = (tab === 'both' || tab === 'pro') ? 'block' : 'none';
    con.style.display = (tab === 'both' || tab === 'con') ? 'block' : 'none';
  }

  function buildCard(side, data) {
    const isPro = side === 'pro';
    const args = data.arguments.map((a, i) => `
      <div class="arg">
        <div class="arg-num">논거 0${i + 1}</div>
        <div class="arg-title">${a.title}</div>
        <p class="arg-body">${a.body}</p>
        ${a.evidence ? `<div class="evidence"><span>📌</span><span>${a.evidence}</span></div>` : ''}
      </div>
    `).join('');

    return `
      <div class="badge">${isPro ? '✦ 찬  성' : '✦ 반  대'}</div>
      <p class="stance">${data.stance}</p>
      <div class="divider"></div>
      ${args}
      <div class="conclusion">
        <div class="conclusion-label">📢 최종 주장</div>
        <p>${data.conclusion}</p>
      </div>
    `;
  }

  async function generate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const topic = document.getElementById('topicInput').value.trim();
    document.getElementById('error').style.display = 'none';
    document.getElementById('result').style.display = 'none';

    if (!apiKey) { showError('Gemini API 키를 입력해 주세요.'); return; }
    if (!topic) { showError('토론 주제를 입력해 주세요.'); return; }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('genBtn').disabled = true;

    const prompt = `당신은 토론 입론서 전문 작성가입니다.
아래 토론 주제에 대해 찬성 측과 반대 측 입론서를 각각 4개의 논거를 포함하여 작성하세요.

토론 주제: ${topic}

반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트, 마크다운 백틱은 절대 포함하지 마세요.

{
  "topic": "주제 문장",
  "pro": {
    "stance": "찬성 측 핵심 입장 (2~3문장)",
    "arguments": [
      { "title": "논거 제목", "body": "상세 설명 (3~4문장)", "evidence": "근거/사례/통계" },
      { "title": "논거 제목", "body": "상세 설명 (3~4문장)", "evidence": "근거/사례/통계" },
      { "title": "논거 제목", "body": "상세 설명 (3~4문장)", "evidence": "근거/사례/통계" },
      { "title": "논거 제목", "body": "상세 설명 (3~4문장)", "evidence": "근거/사례/통계" }
    ],
    "conclusion": "최종 주장 (2~3문장)"
  },
  "con": {
    "stance": "반대 측 핵심 입장 (2~3문장)",
    "arguments": [
      { "title": "논거 제목", "body": "상세 설명 (3~4문장)", "evidence": "근거/사례/통계" },
      { "title": "논거 제목", "body": "상세 설명 (3~4문장)", "evidence": "근거/사례/통계" },
      { "title": "논거 제목", "body": "상세 설명 (3~4문장)", "evidence": "근거/사례/통계" },
      { "title": "논거 제목", "body": "상세 설명 (3~4문장)", "evidence": "근거/사례/통계" }
    ],
    "conclusion": "최종 주장 (2~3문장)"
  }
}`;

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: 3000, temperature: 0.7, responseMimeType: 'application/json' }
          })
        }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const parsed = JSON.parse(raw);

      document.getElementById('topicDisplay').textContent = `"${parsed.topic}"`;
      document.getElementById('proCard').innerHTML = buildCard('pro', parsed.pro);
      document.getElementById('conCard').innerHTML = buildCard('con', parsed.con);

      switchTab('both');
      document.getElementById('result').style.display = 'block';
    } catch (e) {
      showError('오류: ' + (e.message || '다시 시도해 주세요. API 키를 확인하세요.'));
    } finally {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('genBtn').disabled = false;
    }
  }
</script>
</body>
</html>
